# Self-Evolution Engine configuration — Phase E3

[evolution]
enabled = true
phase = "E3"
level = "E2_SANDBOX_EXPERIMENT"
stable_version = "0.5.0"
evaluator_version = "1.0.0"
db_path = "state/dioo.db"

[features]
trajectory_recorder = true
evaluation_engine = true
failure_analyzer = true
proposal_engine = true
failure_to_eval = true
session_reflection_v2 = true
belief_rules_v2 = true
sandbox_experiment = true
verifier = true
comparison_gate = true
evolution_memory = true

[budget]
max_experiments_per_day = 3
max_retries_per_experiment = 2
max_tool_calls_per_experiment = 50
max_candidate_branches = 3
max_concurrent_experiments = 1
max_reflection_per_session = 1

[thresholds]
evaluator_pass_gate = 0.70
failure_repeat_proposal = 3
failure_repeat_monitor = 2
root_cause_min_confidence = 0.55
belief_single_evidence_max_confidence = 0.60

[creator_delegation]
# Standing approval from creator — self-evolution without per-step approval
granted = true
scope = "self_evolution"
granted_at = "2026-07-21"
note = "Creator authorized Dioo to edit and evaluate for self-development without asking each time"
standing_approval_actions = [
  "experiment", "evaluate", "propose", "sandbox_edit",
  "reflection", "failure_analysis", "apply_candidate",
]
still_requires_creator = [
  "identity_core", "evaluator_threshold", "permission_matrix",
  "audit_disable", "rollback_disable", "merge_stable_branch", "production_deploy",
]
