name: Daily News Automation

on:
  # Run every day at 06:00 UTC (13:00 Bangkok time)
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-news:
    name: Fetch & Save Daily News
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch daily news
        run: python news_automation/fetch_news.py

      - name: Commit & push news report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_output/
          # Only commit if there are changes
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "news: daily report $(date -u +'%Y-%m-%d')"
          git push origin ${{ github.ref_name }}
